name: Deploy with Deploy Action

on:
  push: {branches: [main]}
  schedule: [{cron: "15 10 * * *"}]
  workflow_dispatch: {}

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync GitHub User Data
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Fetch user data
            const { data: user } = await github.rest.users.getByUsername({
              username: 'modster'
            });
            fs.writeFileSync('src/data/user.json', JSON.stringify(user, null, 2));
            console.log('✓ Updated user.json');

            // Fetch followers
            const followers = await github.paginate(github.rest.users.listFollowersForUser, {
              username: 'modster',
              per_page: 100
            });
            fs.writeFileSync('src/data/followers.json', JSON.stringify(followers, null, 2));
            console.log(`✓ Updated followers.json (${followers.length} followers)`);

            // Fetch following
            const following = await github.paginate(github.rest.users.listFollowingForUser, {
              username: 'modster',
              per_page: 100
            });
            fs.writeFileSync('src/data/following.json', JSON.stringify(following, null, 2));
            console.log(`✓ Updated following.json (${following.length} following)`);

            // Fetch repos
            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: 'modster',
              per_page: 100
            });
            fs.writeFileSync('src/data/repos.json', JSON.stringify(repos, null, 2));
            console.log(`✓ Updated repos.json (${repos.length} repos)`);

            // Create TSV for repos
            const reposTsv = repos.map(r => [
              r.name,
              r.html_url,
              r.stargazers_count,
              r.language || 'N/A',
              r.description || ''
            ].join('\t')).join('\n');
            fs.writeFileSync('src/data/repos.tsv', 'name\thtml_url\tstargazers_count\tlanguage\tdescription\n' + reposTsv);
            console.log('✓ Updated repos.tsv');

      - name: Commit Synced Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/
          git diff --staged --quiet || (git commit -m "chore: sync GitHub data" && git push)

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          clean-exclude: |
            .nojekyll
            CNAME
